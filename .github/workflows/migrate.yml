name: Run migrations

on:
  workflow_dispatch:

jobs:
  migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull services
        run: |
          docker compose -f production.yml pull postgres migrations

      - name: Start database (detached)
        run: |
          docker compose -f production.yml up -d postgres
          sleep 20 # give Postgres time to initialize

      - name: Run migrations
        run: |
          docker compose -f production.yml run --rm migrations

      - name: Stop database
        run: |
          docker compose -f production.yml down
